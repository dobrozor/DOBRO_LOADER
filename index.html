<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Основной фон теперь светлый */
        body { background: #f8fafc; color: #1e293b; font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }

        /* Настройка широкого и видимого скроллбара */
        .custom-scroll { overflow-y: auto; }
        .custom-scroll::-webkit-scrollbar { width: 12px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-left: 1px solid #e2e8f0; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; border: 3px solid #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Элементы списка на светлом фоне */
        .download-item { border-bottom: 1px solid #e2e8f0; background: white; transition: background 0.2s; }
        .download-item:hover { background: #f1f5f9; }

        /* Прогресс-бар для светлой темы */
        .progress-bg { background: #e2e8f0; height: 8px; border-radius: 4px; overflow: hidden; }
        .progress-fill { background: #3b82f6; width: 0%; height: 100%; transition: width 0.3s; }

        /* ОКНО ЛОГА - остается темным, как вы просили */
        .log-panel { background: #0f172a; border-left: 2px solid #1e293b; display: none; box-shadow: -10px 0 15px -3px rgba(0, 0, 0, 0.1); }
        #log-content { color: #10b981; } /* Изумрудный текст на темном фоне */
    </style>
</head>
<body class="flex flex-col">
    <div class="flex items-center justify-between p-4 bg-white border-b border-slate-200 shadow-sm z-10">
        <div class="flex items-center gap-3">
            <img src="logo.png" class="h-16">
        </div>
        <div class="flex gap-2 items-center">
    <button onclick="pickFile()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition shadow-md h-[40px]">
        <span>+</span> ДОБАВИТЬ JSON
    </button>

    <div class="flex flex-col items-center justify-center h-[60px]"> 
        <button onclick="pickFolder()" class="bg-slate-600 hover:bg-slate-700 text-white px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition shadow-md border border-slate-500 h-[40px]">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
            </svg>
            ПАПКА
        </button>
        <span id="folder-path" class="text-[9px] text-slate-500 mt-1 max-w-[100px] truncate absolute translate-y-7" title="Там же где JSON">Там же где JSON</span>
    </div>

    <button onclick="clearList()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold transition shadow-md h-[40px]">
        ОЧИСТИТЬ
    </button>

    <button onclick="startAll()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg text-sm font-bold transition shadow-md h-[40px]">
        ▶ СКАЧАТЬ ВЫБРАННЫЕ
    </button>
</div>
    </div>

    <div class="flex flex-1 overflow-hidden min-h-0">
        <div class="flex-1 overflow-y-auto custom-scroll bg-slate-50 pb-16" id="tasks-list">
            </div>

        <div id="log-panel" class="w-1/3 log-panel flex flex-col">
            <div class="p-3 border-b border-slate-800 flex justify-between items-center gap-2 bg-slate-900">
                <span class="text-xs font-bold text-slate-400 truncate flex-1">
                    ЛОГ: <span id="current-log-title" class="text-slate-200">-</span>
                </span>
                <div class="flex items-center gap-2">
                    <button onclick="copyCurrentLog(event)" class="text-[10px] bg-slate-800 hover:bg-slate-700 text-slate-300 px-2 py-1 rounded border border-slate-700 transition">
                        📋 КОПИРОВАТЬ
                    </button>
                    <button onclick="closeLog()" class="text-slate-500 hover:text-white px-1">✕</button>
                </div>
            </div>
            <div id="log-content" class="p-4 font-mono text-[10px] overflow-y-auto flex-1 custom-scroll">
                <div class="text-slate-500">> Выберите задачу для просмотра лога</div>
            </div>
        </div>
    </div>

    <script>
        let tasks = {};
        let selectedFolder = null;

        async function pickFolder() {
            const result = await pywebview.api.select_folder();
            if (result) {
                selectedFolder = result;
                const folderDisplay = document.getElementById('folder-path');
                folderDisplay.innerText = result.split(/[\\/]/).pop() || result;
                folderDisplay.title = result;
            }
        }

        async function pickFile() {
            const results = await pywebview.api.select_json();
            if (results && Array.isArray(results)) {
                // Итерируем по всем выбранным файлам
                results.forEach(task => {
                    createTaskRow(task);
                });
            }
        }

        function createTaskRow(data) {
            const id = data.id;
            tasks[id] = { ...data, logs: [] };

            const row = document.createElement('div');
            row.id = `task-${id}`;
            row.className = 'download-item p-4 flex items-center gap-4';
            row.innerHTML = `
                <div class="flex items-center gap-3">
                    <input type="checkbox" id="check-${id}" class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500 cursor-pointer" checked>
                </div>
                
                <div class="flex-1 min-w-0">
                    <div class="text-sm font-semibold text-slate-800 truncate" title="${data.filename}">${data.filename}</div>
                    <div class="text-[10px] text-slate-500 mt-1 uppercase font-bold">${data.quality_label || 'JSON'}</div>
                </div>

                <div class="flex items-center gap-2">
                    <button onclick="removeTask('${id}')" class="bg-red-50 hover:bg-red-100 p-2 rounded text-red-500 transition border border-red-100" title="Удалить">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    </button>
                </div>

                <div class="w-48">
                    <div class="flex justify-between mb-1">
                        <span id="status-${id}" class="text-[10px] text-slate-500 font-medium italic">Ожидание...</span>
                        <span id="percent-${id}" class="text-[10px] font-bold text-blue-600">0%</span>
                    </div>
                    <div class="progress-bg">
                        <div id="bar-${id}" class="progress-fill"></div>
                    </div>
                </div>

                <div class="flex items-center gap-3">
                    <select id="select-${id}" class="bg-white border border-slate-300 text-slate-700 text-[11px] rounded px-2 py-1 outline-none focus:ring-2 focus:ring-blue-500">
                        ${data.qualities.map(q => `<option value="${q}">${q}p</option>`).join('')}
                    </select>

                    <button id="btn-${id}" onclick="startTask('${id}')" class="bg-emerald-600 hover:bg-emerald-700 p-2 rounded text-white transition shadow-sm">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                            <path d="M15.41 12.59L10.5 15.5C10.1 15.74 9.5 15.45 9.5 14.91V9.09C9.5 8.55 10.1 8.26 10.5 8.5L15.41 11.41C15.8 11.65 15.8 12.35 15.41 12.59Z" fill="currentColor"/>
                        </svg>
                    </button>

                    <button onclick="showLog('${id}')" class="bg-slate-200 hover:bg-slate-300 p-2 rounded text-slate-700 transition border border-slate-300">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
                    </button>
                </div>
            `;
            document.getElementById('tasks-list').appendChild(row);
        }

        function startTask(id) {
            const q = document.getElementById(`select-${id}`).value;
            document.getElementById(`btn-${id}`).disabled = true;
            document.getElementById(`btn-${id}`).classList.add('opacity-30');
            pywebview.api.start_download(id, q, selectedFolder);
        }

        function showLog(id) {
            document.getElementById('log-panel').style.display = 'flex';
            document.getElementById('current-log-title').innerText = tasks[id].filename;
            renderLog(id);
        }

        async function copyCurrentLog() {
    const container = document.getElementById('log-content');
    // Получаем текст, игнорируя HTML-теги (метки времени и прочее сохранятся как текст)
    const logText = container.innerText;

    if (!logText || logText.includes("Выберите задачу")) {
        return;
    }

    try {
        await navigator.clipboard.writeText(logText);

        // Визуальное подтверждение на кнопке
        const btn = event.currentTarget;
        const originalText = btn.innerText;
        btn.innerText = "✅ СКОПИРОВАНО";
        btn.classList.replace('bg-slate-800', 'bg-emerald-900');

        setTimeout(() => {
            btn.innerText = originalText;
            btn.classList.replace('bg-emerald-900', 'bg-slate-800');
        }, 2000);
    } catch (err) {
        alert("✅ СКОПИРОВАНО");
    }
}

        function closeLog() {
            document.getElementById('log-panel').style.display = 'none';
        }

        function startAll() {
            Object.keys(tasks).forEach(id => {
                const btn = document.getElementById(`btn-${id}`);
                const checkbox = document.getElementById(`check-${id}`);
                
                // Запускаем только если галочка стоит и кнопка старта еще активна (не запущено)
                if (btn && !btn.disabled && checkbox && checkbox.checked) {
                    startTask(id);
                }
            });
        }

        function clearList() {
            if (confirm("Вы уверены, что хотите полностью очистить весь список?")) {
                const taskIds = Object.keys(tasks);
                taskIds.forEach(id => removeTask(id, false)); // false чтобы не спрашивать подтверждение для каждого
            }
        }

        function renderLog(id) {
            const container = document.getElementById('log-content');
            const activeLogTitle = document.getElementById('current-log-title').innerText;
            if (activeLogTitle === tasks[id].filename) {
                container.innerHTML = tasks[id].logs.join('');
                container.scrollTop = container.scrollHeight;
            }
        }

        function removeTask(id, askConfirm = true) {
            if (!askConfirm || confirm("Удалить задачу из списка?")) {
                // Удаляем визуальный элемент
                const row = document.getElementById(`task-${id}`);
                if (row) row.remove();

                // Если открыт лог этой задачи — закрываем его
                const activeLogTitle = document.getElementById('current-log-title').innerText;
                if (tasks[id] && activeLogTitle === tasks[id].filename) {
                    closeLog();
                }

                // Удаляем из локального хранилища JS
                delete tasks[id];

                // Удаляем из памяти Python
                pywebview.api.delete_task(id);
            }
        }

        // Вызывается из Python
        window.updateTaskProgress = (id, percent, status) => {
            document.getElementById(`bar-${id}`).style.width = percent + '%';
            document.getElementById(`percent-${id}`).innerText = Math.round(percent) + '%';
            if(status) document.getElementById(`status-${id}`).innerText = status;
        }

        window.addTaskLog = (id, msg) => {
            const entry = `<div class="mb-1"><span class="text-slate-700">[${new Date().toLocaleTimeString()}]</span> ${msg}</div>`;
            if (tasks[id]) {
                tasks[id].logs.push(entry);
                renderLog(id);
            }
        }
    </script>
</body>

</html>
